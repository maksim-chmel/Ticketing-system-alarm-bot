version: '3.9'

services:
  alarm-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alarm-bot
    restart: always
    
    env_file:
      - .env
    
   
    networks:
      - feedback_shared_network

    
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  
  feedback_shared_network:
    external: true